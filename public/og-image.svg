<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="50%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#0ea5e9" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.2" />
        </filter>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)" />
    
    <!-- White Content Box -->
    <rect x="100" y="100" width="1000" height="430" rx="40" fill="#ffffff" filter="url(#shadow)" />
    
    <!-- Title -->
    <text x="600" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="900" fill="#1e3a8a" text-anchor="middle" letter-spacing="-2">
        Papa-Quest
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#64748b" text-anchor="middle">
        産後クライシス予防・パパ向け育児支援アプリ
    </text>
    
    <!-- Badges / Tags -->
    <g transform="translate(420, 440)">
        <rect x="0" y="0" width="160" height="48" rx="24" fill="#eff6ff" />
        <text x="80" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">🚀 毎日1ミッション</text>
    </g>
    
    <g transform="translate(600, 440)">
        <rect x="0" y="0" width="160" height="48" rx="24" fill="#fdf4ff" />
        <text x="80" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#c026d3" text-anchor="middle">🎁 妻をケアする</text>
    </g>
</svg>
